<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Esp32</title>
</head>

<body>
    <h1>Rfid Thingy</h1>
    <h2>Status: <div id="status">Inactive</div>
    </h2>
    <button id="activate">Activate</button>
    <button id="deactivate">Deactivate</button>
    <h2>Operation: <div>None</div>
    </h2>
    <div>
        <button>None</button>
    </div>

    <div class="block">
        <h3>Write to block</h3>
        <div>
            <h4>Hexadecimal</h4>
            <textarea cols="16" class="hex_code" name="hex_code" maxlength="16"></textarea>
            <button>Use Hexadecimal</button>
        </div>

        <button>Submit operation</button>
    </div>

    <script src="js/main.js"></script>
</body>

</html>
