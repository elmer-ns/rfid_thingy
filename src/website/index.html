<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Esp32</title>
</head>
<body>
    <h1>Rfid Thingy</h1>
    <h2>Status: <div>Inactive</div></h2>
    <button>Activate</button>
    <button>Deactivate</button>
    <h2>Operation: <div>None</div></h2>
    <div>
        <button>None</button>
    </div>
    <div class="card">
        <textarea cols="64" class="hex_code" name="hex_code" maxlength="1024"></textarea>
        <button>WriteCard</button>
    </div>
    <div class="sector">
        <textarea cols="16" class="hex_code" name="hex_code" maxlength="64"></textarea>
        <button>WriteSector</button>
    </div>
    <div class="block">
        <textarea cols="16" class="hex_code" name="hex_code" maxlength="16"></textarea>
        <button>WriteBlock</button>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
